<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazar</title>
    {%load static%}
    <link rel="stylesheet" href="{%static 'css/homepage.css'%}">
</head>
<body>
    <div class="horek">
        <div class="leva-strana">
            <img src="https://avatars.githubusercontent.com/u/34084239?s=280&v=4" style="width: 40px; height: 40px;">
            <h1 style="cursor: pointer;">&nbsp Bazar</h1>
        </div>
        <div class="prava-strana">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjfsK9iGkMtV5p88Kry1F0rdrL7RndRENRJw&usqp=CAU" style="width: 40px; height: 40px;" >
        {% if request.user.is_authenticated %}
            <form method="post">
                {% csrf_token %}
                <button type="submit" name="btn1"><h2 style="cursor: pointer;">profile</h2></button>
            </form>
        {% else %}
            {% csrf_token %}
            <a href="{% url 'signup' %}"><h2 style="cursor: pointer;">&nbsp signup</h2></a>
        {% endif %}
    </div>  
    </div>
    <nav class="sidebar">
        <ul class="menu">
            {% for category in category %}
            <div>
                <li>
                    <a href="{% url 'category' category.id %}">
                        <span class="title"><img src="{{ category.picture.url }}" style=" width: 20px; height: 20px;">
                            &nbsp
                            &nbsp
                            {{ category.name }}
                        </span>
                    </a>
                </li>
            </div>
            {% endfor %}
        </ul>
    </nav>
    <button onclick="addRectangle()" class="inzerat">+</button>
    {%load static%}
    <script src="{%static 'js/homepage.js'%}"></script>
</body>
</html>
